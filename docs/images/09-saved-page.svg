<svg xmlns="http://www.w3.org/2000/svg" width="700" height="380" font-family="'Segoe UI', Tahoma, sans-serif">
  <!-- Window background -->
  <rect width="700" height="380" fill="#d9d9d9" rx="4"/>
  <rect width="700" height="28" fill="#4a90e2" rx="4"/>
  <rect y="14" width="700" height="14" fill="#4a90e2"/>
  <text x="14" y="19" fill="white" font-size="12" font-weight="bold">VMIX Bible Link</text>
  <circle cx="668" cy="14" r="7" fill="#e84" stroke="#c63" stroke-width="1"/>
  <circle cx="648" cy="14" r="7" fill="#6b6" stroke="#494" stroke-width="1"/>

  <!-- Nav bar -->
  <rect x="0" y="28" width="700" height="32" fill="#e0e0e0" stroke="#aaa" stroke-width="1"/>
  <rect x="8" y="32" width="80" height="24" rx="2" fill="#ccc" stroke="#999" stroke-width="1"/>
  <text x="28" y="48" fill="#999" font-size="10">Search</text>
  <rect x="92" y="32" width="70" height="24" rx="2" fill="#e8e8e8" stroke="#999" stroke-width="1"/>
  <text x="110" y="48" fill="#333" font-size="10">Bible</text>
  <rect x="166" y="32" width="70" height="24" rx="2" fill="#e8e8e8" stroke="#999" stroke-width="1"/>
  <text x="180" y="48" fill="#333" font-size="10">Verses</text>
  <rect x="240" y="32" width="70" height="24" rx="2" fill="#ffd700" stroke="#cc9900" stroke-width="1"/>
  <text x="255" y="48" fill="#333" font-size="10" font-weight="bold">Saved</text>
  <rect x="314" y="32" width="80" height="24" rx="2" fill="#e8e8e8" stroke="#999" stroke-width="1"/>
  <text x="328" y="48" fill="#333" font-size="10">Settings</text>
  <rect x="640" y="35" width="36" height="18" rx="3" fill="#888"/>
  <text x="648" y="48" fill="white" font-size="9" font-weight="bold">OFF</text>

  <!-- Page heading -->
  <text x="20" y="84" fill="#333" font-size="16" font-weight="bold">Saved Verse Groups</text>

  <!-- Card 1: Genesis 3:1-3 -->
  <rect x="12" y="96" width="676" height="110" fill="#fff" rx="2"/>
  <line x1="12" y1="96" x2="688" y2="96" stroke="white" stroke-width="1.5"/>
  <line x1="12" y1="96" x2="12" y2="206" stroke="white" stroke-width="1.5"/>
  <line x1="688" y1="96" x2="688" y2="206" stroke="#606060" stroke-width="1.5"/>
  <line x1="12" y1="206" x2="688" y2="206" stroke="#606060" stroke-width="1.5"/>

  <text x="20" y="118" fill="#333" font-size="13" font-weight="bold">Genesis 3:1-3</text>
  <text x="130" y="118" fill="#999" font-size="10">2/15/26, 10:30 AM</text>

  <!-- Action buttons row -->
  <rect x="570" y="102" width="26" height="26" rx="3" fill="#e8e8e8" stroke="#999" stroke-width="1"/>
  <text x="577" y="120" fill="#555" font-size="12">&#9654;</text>
  <rect x="600" y="102" width="26" height="26" rx="3" fill="#e8e8e8" stroke="#999" stroke-width="1"/>
  <text x="606" y="120" fill="#555" font-size="11">&#9632;</text>
  <rect x="630" y="102" width="26" height="26" rx="3" fill="#e8e8e8" stroke="#999" stroke-width="1"/>
  <text x="638" y="119" fill="#555" font-size="10">&#9998;</text>
  <rect x="660" y="102" width="26" height="26" rx="3" fill="#e8e8e8" stroke="#999" stroke-width="1"/>
  <text x="667" y="119" fill="#d33" font-size="10">&#128465;</text>

  <text x="20" y="140" fill="#444" font-size="11" font-family="Georgia, serif">Now the serpent was more crafty than any beast of the field which</text>
  <text x="20" y="156" fill="#444" font-size="11" font-family="Georgia, serif">the LORD God had made. And he said unto the woman, Yea, hath</text>
  <text x="20" y="172" fill="#444" font-size="11" font-family="Georgia, serif">God said, Ye shall not eat of every tree of the garden?...</text>

  <!-- Card 2: John 3:16 -->
  <rect x="12" y="220" width="676" height="100" fill="#fff" rx="2"/>
  <line x1="12" y1="220" x2="688" y2="220" stroke="white" stroke-width="1.5"/>
  <line x1="12" y1="220" x2="12" y2="320" stroke="white" stroke-width="1.5"/>
  <line x1="688" y1="220" x2="688" y2="320" stroke="#606060" stroke-width="1.5"/>
  <line x1="12" y1="320" x2="688" y2="320" stroke="#606060" stroke-width="1.5"/>

  <text x="20" y="242" fill="#333" font-size="13" font-weight="bold">John 3:16</text>
  <text x="105" y="242" fill="#999" font-size="10">2/14/26, 9:15 AM</text>

  <!-- Action buttons -->
  <rect x="570" y="226" width="26" height="26" rx="3" fill="#e8e8e8" stroke="#999" stroke-width="1"/>
  <text x="577" y="244" fill="#555" font-size="12">&#9654;</text>
  <rect x="600" y="226" width="26" height="26" rx="3" fill="#e8e8e8" stroke="#999" stroke-width="1"/>
  <text x="606" y="244" fill="#555" font-size="11">&#9632;</text>
  <rect x="630" y="226" width="26" height="26" rx="3" fill="#e8e8e8" stroke="#999" stroke-width="1"/>
  <text x="638" y="243" fill="#555" font-size="10">&#9998;</text>
  <rect x="660" y="226" width="26" height="26" rx="3" fill="#e8e8e8" stroke="#999" stroke-width="1"/>
  <text x="667" y="243" fill="#d33" font-size="10">&#128465;</text>

  <text x="20" y="264" fill="#444" font-size="11" font-family="Georgia, serif">For God so loved the world, that he gave his only begotten Son,</text>
  <text x="20" y="280" fill="#444" font-size="11" font-family="Georgia, serif">that whosoever believeth in him should not perish, but have</text>
  <text x="20" y="296" fill="#444" font-size="11" font-family="Georgia, serif">everlasting life.</text>

  <!-- Annotation -->
  <text x="350" y="350" fill="#e44" font-size="9" font-weight="bold" text-anchor="middle">Most recently saved entries appear at the top</text>
</svg>
