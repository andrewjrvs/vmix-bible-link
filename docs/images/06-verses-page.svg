  <text x="14" y="19" fill="white" font-size="12" font-weight="bold">VMIX Bible Link</text>
  <circle cx="668" cy="14" r="7" fill="#e84" stroke="#c63" stroke-width="1"/>
  <circle cx="648" cy="14" r="7" fill="#6b6" stroke="#494" stroke-width="1"/>

  <!-- Nav bar -->
  <rect x="0" y="28" width="700" height="32" fill="#e0e0e0" stroke="#aaa" stroke-width="1"/>
