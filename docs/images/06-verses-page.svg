<svg xmlns="http://www.w3.org/2000/svg" width="700" height="400" font-family="'Segoe UI', Tahoma, sans-serif">
  <!-- Window background -->
  <rect width="700" height="400" fill="#d9d9d9" rx="4"/>
  <rect width="700" height="28" fill="#4a90e2" rx="4"/>
