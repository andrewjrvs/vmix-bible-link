  <!-- Chapter heading -->
  <text x="20" y="84" fill="#333" font-size="18" font-weight="bold">Genesis 3</text>

  <!-- Verse content area (parchment style) -->
  <rect x="12" y="96" width="676" height="292" rx="3" fill="#f5f5dc" stroke="#b0b0b0" stroke-width="1"/>

  <!-- Column dividers -->
  <line x1="237" y1="106" x2="237" y2="378" stroke="#d5d5c0" stroke-width="1"/>
  <line x1="462" y1="106" x2="462" y2="378" stroke="#d5d5c0" stroke-width="1"/>

  <!-- Column 1 -->
  <text x="24" y="124" font-size="11"><tspan fill="#4a90e2" font-weight="bold">1</tspan><tspan fill="#333" font-family="Georgia, serif" dx="4">Now the serpent was</tspan></text>
  <text x="36" y="140" fill="#333" font-family="Georgia, serif" font-size="11">more subtil than any</text>
  <text x="36" y="156" fill="#333" font-family="Georgia, serif" font-size="11">beast of the field...</text>

  <text x="24" y="184" font-size="11"><tspan fill="#4a90e2" font-weight="bold">2</tspan><tspan fill="#333" font-family="Georgia, serif" dx="4">And the woman said</tspan></text>
  <text x="36" y="200" fill="#333" font-family="Georgia, serif" font-size="11">unto the serpent, We</text>
  <text x="36" y="216" fill="#333" font-family="Georgia, serif" font-size="11">may eat of the fruit...</text>

  <text x="24" y="244" font-size="11"><tspan fill="#4a90e2" font-weight="bold">3</tspan><tspan fill="#333" font-family="Georgia, serif" dx="4">But of the fruit of the</tspan></text>
  <text x="36" y="260" fill="#333" font-family="Georgia, serif" font-size="11">tree which is in the</text>
  <text x="36" y="276" fill="#333" font-family="Georgia, serif" font-size="11">midst of the garden...</text>

  <!-- Column 2 -->
  <text x="249" y="124" font-size="11"><tspan fill="#4a90e2" font-weight="bold">4</tspan><tspan fill="#333" font-family="Georgia, serif" dx="4">And the serpent said</tspan></text>
  <text x="261" y="140" fill="#333" font-family="Georgia, serif" font-size="11">unto the woman, Ye</text>
  <text x="261" y="156" fill="#333" font-family="Georgia, serif" font-size="11">shall not surely die...</text>

  <text x="249" y="184" font-size="11"><tspan fill="#4a90e2" font-weight="bold">5</tspan><tspan fill="#333" font-family="Georgia, serif" dx="4">For God doth know</tspan></text>
  <text x="261" y="200" fill="#333" font-family="Georgia, serif" font-size="11">that in the day ye eat</text>
  <text x="261" y="216" fill="#333" font-family="Georgia, serif" font-size="11">thereof, then your...</text>

  <text x="249" y="244" font-size="11"><tspan fill="#4a90e2" font-weight="bold">6</tspan><tspan fill="#333" font-family="Georgia, serif" dx="4">And when the woman</tspan></text>
  <text x="261" y="260" fill="#333" font-family="Georgia, serif" font-size="11">saw that the tree was</text>
  <text x="261" y="276" fill="#333" font-family="Georgia, serif" font-size="11">good for food, and...</text>

  <!-- Column 3 -->
  <text x="474" y="124" font-size="11"><tspan fill="#4a90e2" font-weight="bold">7</tspan><tspan fill="#333" font-family="Georgia, serif" dx="4">And the eyes of them</tspan></text>
  <text x="486" y="140" fill="#333" font-family="Georgia, serif" font-size="11">both were opened,</text>
  <text x="486" y="156" fill="#333" font-family="Georgia, serif" font-size="11">and they knew that...</text>

  <text x="474" y="184" font-size="11"><tspan fill="#4a90e2" font-weight="bold">8</tspan><tspan fill="#333" font-family="Georgia, serif" dx="4">And they heard the</tspan></text>
  <text x="486" y="200" fill="#333" font-family="Georgia, serif" font-size="11">voice of the LORD</text>
  <text x="486" y="216" fill="#333" font-family="Georgia, serif" font-size="11">God walking in the...</text>

  <text x="474" y="244" font-size="11"><tspan fill="#4a90e2" font-weight="bold">9</tspan><tspan fill="#333" font-family="Georgia, serif" dx="4">And the LORD God</tspan></text>
  <text x="486" y="260" fill="#333" font-family="Georgia, serif" font-size="11">called unto Adam,</text>
  <text x="486" y="276" fill="#333" font-family="Georgia, serif" font-size="11">and said unto him...</text>

  <!-- Annotation -->
  <text x="350" y="360" fill="#e44" font-size="9" font-weight="bold" text-anchor="middle">Click any verse to select it</text>
</svg>
