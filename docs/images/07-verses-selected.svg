<svg xmlns="http://www.w3.org/2000/svg" width="700" height="400" font-family="'Segoe UI', Tahoma, sans-serif">
  <!-- Window background -->
  <rect width="700" height="400" fill="#d9d9d9" rx="4"/>
  <rect width="700" height="28" fill="#4a90e2" rx="4"/>
  <rect y="14" width="700" height="14" fill="#4a90e2"/>
  <text x="14" y="19" fill="white" font-size="12" font-weight="bold">VMIX Bible Link</text>
  <circle cx="668" cy="14" r="7" fill="#e84" stroke="#c63" stroke-width="1"/>
  <circle cx="648" cy="14" r="7" fill="#6b6" stroke="#494" stroke-width="1"/>

  <!-- Nav bar -->
  <rect x="0" y="28" width="700" height="32" fill="#e0e0e0" stroke="#aaa" stroke-width="1"/>
  <rect x="8" y="32" width="80" height="24" rx="2" fill="#ccc" stroke="#999" stroke-width="1"/>
  <text x="28" y="48" fill="#999" font-size="10">Search</text>
  <rect x="92" y="32" width="70" height="24" rx="2" fill="#e8e8e8" stroke="#999" stroke-width="1"/>
  <text x="110" y="48" fill="#333" font-size="10">Bible</text>
  <rect x="166" y="32" width="70" height="24" rx="2" fill="#ffd700" stroke="#cc9900" stroke-width="1"/>
  <text x="180" y="48" fill="#333" font-size="10" font-weight="bold">Verses</text>
  <rect x="240" y="32" width="70" height="24" rx="2" fill="#e8e8e8" stroke="#999" stroke-width="1"/>
  <text x="258" y="48" fill="#333" font-size="10">Saved</text>
  <rect x="314" y="32" width="80" height="24" rx="2" fill="#e8e8e8" stroke="#999" stroke-width="1"/>
  <text x="328" y="48" fill="#333" font-size="10">Settings</text>
  <rect x="640" y="35" width="36" height="18" rx="3" fill="#888"/>
  <text x="648" y="48" fill="white" font-size="9" font-weight="bold">OFF</text>

  <!-- Chapter heading -->
  <text x="20" y="84" fill="#333" font-size="18" font-weight="bold">Genesis 3</text>

  <!-- Verse content area -->
  <rect x="12" y="96" width="676" height="252" rx="3" fill="#f5f5dc" stroke="#b0b0b0" stroke-width="1"/>
  <line x1="237" y1="106" x2="237" y2="338" stroke="#d5d5c0" stroke-width="1"/>
  <line x1="462" y1="106" x2="462" y2="338" stroke="#d5d5c0" stroke-width="1"/>

  <!-- Verse 1 - SELECTED (green highlight) -->
  <rect x="14" y="106" width="221" height="70" fill="#c8e6c9" rx="2"/>
  <text x="24" y="124" font-size="11"><tspan fill="#2e7d32" font-weight="bold">1</tspan><tspan fill="#1b5e20" font-family="Georgia, serif" dx="4">Now the serpent was</tspan></text>
  <text x="36" y="140" fill="#1b5e20" font-family="Georgia, serif" font-size="11">more subtil than any</text>
  <text x="36" y="156" fill="#1b5e20" font-family="Georgia, serif" font-size="11">beast of the field...</text>

  <!-- Verse 2 - SELECTED (green highlight) -->
  <rect x="14" y="180" width="221" height="70" fill="#c8e6c9" rx="2"/>
  <text x="24" y="198" font-size="11"><tspan fill="#2e7d32" font-weight="bold">2</tspan><tspan fill="#1b5e20" font-family="Georgia, serif" dx="4">And the woman said</tspan></text>
  <text x="36" y="214" fill="#1b5e20" font-family="Georgia, serif" font-size="11">unto the serpent, We</text>
  <text x="36" y="230" fill="#1b5e20" font-family="Georgia, serif" font-size="11">may eat of the fruit...</text>

  <!-- Verse 3 - SELECTED -->
  <rect x="14" y="254" width="221" height="70" fill="#c8e6c9" rx="2"/>
  <text x="24" y="272" font-size="11"><tspan fill="#2e7d32" font-weight="bold">3</tspan><tspan fill="#1b5e20" font-family="Georgia, serif" dx="4">But of the fruit of the</tspan></text>
  <text x="36" y="288" fill="#1b5e20" font-family="Georgia, serif" font-size="11">tree which is in the</text>
  <text x="36" y="304" fill="#1b5e20" font-family="Georgia, serif" font-size="11">midst of the garden...</text>

  <!-- Verse 4 - not selected -->
  <text x="249" y="124" font-size="11"><tspan fill="#4a90e2" font-weight="bold">4</tspan><tspan fill="#333" font-family="Georgia, serif" dx="4">And the serpent said</tspan></text>
  <text x="261" y="140" fill="#333" font-family="Georgia, serif" font-size="11">unto the woman, Ye</text>
  <text x="261" y="156" fill="#333" font-family="Georgia, serif" font-size="11">shall not surely die...</text>

  <!-- Verse 5 - SELECTED -->
  <rect x="239" y="180" width="221" height="70" fill="#c8e6c9" rx="2"/>
  <text x="249" y="198" font-size="11"><tspan fill="#2e7d32" font-weight="bold">5</tspan><tspan fill="#1b5e20" font-family="Georgia, serif" dx="4">For God doth know</tspan></text>
  <text x="261" y="214" fill="#1b5e20" font-family="Georgia, serif" font-size="11">that in the day ye eat</text>
  <text x="261" y="230" fill="#1b5e20" font-family="Georgia, serif" font-size="11">thereof, then your...</text>

  <!-- Verse 6 - not selected -->
  <text x="249" y="272" font-size="11"><tspan fill="#4a90e2" font-weight="bold">6</tspan><tspan fill="#333" font-family="Georgia, serif" dx="4">And when the woman</tspan></text>
  <text x="261" y="288" fill="#333" font-family="Georgia, serif" font-size="11">saw that the tree was</text>

  <!-- Column 3 -->
  <text x="474" y="124" font-size="11"><tspan fill="#4a90e2" font-weight="bold">7</tspan><tspan fill="#333" font-family="Georgia, serif" dx="4">And the eyes of them</tspan></text>
  <text x="486" y="140" fill="#333" font-family="Georgia, serif" font-size="11">both were opened...</text>

  <!-- Action bar at bottom -->
  <rect x="0" y="356" width="700" height="44" fill="#333"/>
  <text x="16" y="383" fill="#fff" font-size="12" font-weight="bold">Genesis 3:1-3, 5</text>

  <!-- Action bar buttons -->
  <rect x="380" y="364" width="70" height="28" rx="2" fill="#e8e8e8"/>
  <line x1="380" y1="364" x2="450" y2="364" stroke="white" stroke-width="1"/>
  <line x1="380" y1="364" x2="380" y2="392" stroke="white" stroke-width="1"/>
  <line x1="450" y1="364" x2="450" y2="392" stroke="#606060" stroke-width="1"/>
  <line x1="380" y1="392" x2="450" y2="392" stroke="#606060" stroke-width="1"/>
  <text x="402" y="382" fill="#333" font-size="10">Clear</text>

  <rect x="458" y="364" width="70" height="28" rx="2" fill="#e8e8e8"/>
  <line x1="458" y1="364" x2="528" y2="364" stroke="white" stroke-width="1"/>
  <line x1="458" y1="364" x2="458" y2="392" stroke="white" stroke-width="1"/>
  <line x1="528" y1="364" x2="528" y2="392" stroke="#606060" stroke-width="1"/>
  <line x1="458" y1="392" x2="528" y2="392" stroke="#606060" stroke-width="1"/>
  <text x="480" y="382" fill="#333" font-size="10">Save</text>

  <rect x="536" y="364" width="70" height="28" rx="2" fill="#4a90e2"/>
  <text x="546" y="382" fill="white" font-size="10" font-weight="bold">Send</text>

  <rect x="614" y="364" width="78" height="28" rx="2" fill="#6bc76b"/>
  <text x="619" y="382" fill="white" font-size="10" font-weight="bold">Send+Show</text>

  <!-- Annotation -->
  <line x1="350" y1="356" x2="350" y2="344" stroke="#e44" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="350" y="340" fill="#e44" font-size="9" font-weight="bold" text-anchor="middle">Action bar appears when verses are selected</text>
</svg>
