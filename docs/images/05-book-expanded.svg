<svg xmlns="http://www.w3.org/2000/svg" width="700" height="420" font-family="'Segoe UI', Tahoma, sans-serif">
  <!-- Window background -->
  <rect width="700" height="420" fill="#d9d9d9" rx="4"/>
  <rect width="700" height="28" fill="#4a90e2" rx="4"/>
  <rect y="14" width="700" height="14" fill="#4a90e2"/>
  <text x="14" y="19" fill="white" font-size="12" font-weight="bold">VMIX Bible Link</text>
  <circle cx="668" cy="14" r="7" fill="#e84" stroke="#c63" stroke-width="1"/>
  <circle cx="648" cy="14" r="7" fill="#6b6" stroke="#494" stroke-width="1"/>

  <!-- Nav bar -->
  <rect x="0" y="28" width="700" height="32" fill="#e0e0e0" stroke="#aaa" stroke-width="1"/>
  <rect x="8" y="32" width="80" height="24" rx="2" fill="#ccc" stroke="#999" stroke-width="1"/>
  <text x="28" y="48" fill="#999" font-size="10">Search</text>
  <rect x="92" y="32" width="70" height="24" rx="2" fill="#ffd700" stroke="#cc9900" stroke-width="1"/>
  <text x="110" y="48" fill="#333" font-size="10" font-weight="bold">Bible</text>
  <rect x="166" y="32" width="70" height="24" rx="2" fill="#ccc" stroke="#999" stroke-width="1"/>
  <text x="180" y="48" fill="#999" font-size="10">Verses</text>
  <rect x="240" y="32" width="70" height="24" rx="2" fill="#e8e8e8" stroke="#999" stroke-width="1"/>
  <text x="258" y="48" fill="#333" font-size="10">Saved</text>
  <rect x="314" y="32" width="80" height="24" rx="2" fill="#e8e8e8" stroke="#999" stroke-width="1"/>
  <text x="328" y="48" fill="#333" font-size="10">Settings</text>
  <rect x="640" y="35" width="36" height="18" rx="3" fill="#888"/>
  <text x="648" y="48" fill="white" font-size="9" font-weight="bold">OFF</text>

  <!-- OT column -->
  <rect x="8" y="68" width="335" height="340" fill="#f0f0f0" stroke="#808080" stroke-width="1"/>
  <rect x="10" y="70" width="331" height="26" fill="#4a90e2" rx="2"/>
  <text x="22" y="88" fill="white" font-size="12" font-weight="bold">Old Testament</text>

  <!-- Genesis expanded (highlight) -->
  <rect x="10" y="100" width="331" height="24" fill="#ddeeff" stroke="#4a90e2" stroke-width="2" rx="1"/>
  <text x="18" y="116" fill="#333" font-size="11" font-weight="600">Genesis</text>
  <text x="240" y="116" fill="#666" font-size="9">50 chapters</text>
  <text x="322" y="116" fill="#333" font-size="9">&#9660;</text>

  <!-- Chapter buttons grid -->
  <rect x="14" y="128" width="60" height="24" fill="#e8e8e8" stroke="#bbb" stroke-width="1" rx="2"/>
  <text x="33" y="144" fill="#333" font-size="10" text-anchor="middle">Ch 1</text>
  <rect x="78" y="128" width="60" height="24" fill="#e8e8e8" stroke="#bbb" stroke-width="1" rx="2"/>
  <text x="97" y="144" fill="#333" font-size="10" text-anchor="middle">Ch 2</text>
  <rect x="142" y="128" width="60" height="24" fill="#4a90e2" stroke="#357abd" stroke-width="1" rx="2"/>
  <text x="161" y="144" fill="white" font-size="10" font-weight="bold" text-anchor="middle">Ch 3</text>
  <rect x="206" y="128" width="60" height="24" fill="#e8e8e8" stroke="#bbb" stroke-width="1" rx="2"/>
  <text x="225" y="144" fill="#333" font-size="10" text-anchor="middle">Ch 4</text>
  <rect x="270" y="128" width="60" height="24" fill="#e8e8e8" stroke="#bbb" stroke-width="1" rx="2"/>
  <text x="289" y="144" fill="#333" font-size="10" text-anchor="middle">Ch 5</text>

  <rect x="14" y="156" width="60" height="24" fill="#e8e8e8" stroke="#bbb" stroke-width="1" rx="2"/>
  <text x="33" y="172" fill="#333" font-size="10" text-anchor="middle">Ch 6</text>
  <rect x="78" y="156" width="60" height="24" fill="#e8e8e8" stroke="#bbb" stroke-width="1" rx="2"/>
  <text x="97" y="172" fill="#333" font-size="10" text-anchor="middle">Ch 7</text>
  <rect x="142" y="156" width="60" height="24" fill="#e8e8e8" stroke="#bbb" stroke-width="1" rx="2"/>
  <text x="161" y="172" fill="#333" font-size="10" text-anchor="middle">Ch 8</text>
  <rect x="206" y="156" width="60" height="24" fill="#e8e8e8" stroke="#bbb" stroke-width="1" rx="2"/>
  <text x="225" y="172" fill="#333" font-size="10" text-anchor="middle">Ch 9</text>
  <rect x="270" y="156" width="60" height="24" fill="#e8e8e8" stroke="#bbb" stroke-width="1" rx="2"/>
  <text x="289" y="172" fill="#333" font-size="10" text-anchor="middle">Ch 10</text>

  <text x="14" y="200" fill="#888" font-size="9">... more chapters ...</text>

  <!-- Exodus collapsed -->
  <rect x="10" y="212" width="331" height="24" fill="#e8e8e8" stroke="#bbb" stroke-width="1" rx="1"/>
  <text x="18" y="228" fill="#333" font-size="11" font-weight="600">Exodus</text>
  <text x="240" y="228" fill="#666" font-size="9">40 chapters</text>
  <text x="322" y="228" fill="#333" font-size="9">&#9654;</text>

  <rect x="10" y="238" width="331" height="24" fill="#e8e8e8" stroke="#bbb" stroke-width="1" rx="1"/>
  <text x="18" y="254" fill="#333" font-size="11" font-weight="600">Leviticus</text>
  <text x="240" y="254" fill="#666" font-size="9">27 chapters</text>
  <text x="322" y="254" fill="#333" font-size="9">&#9654;</text>

  <!-- NT column -->
  <rect x="357" y="68" width="335" height="340" fill="#f0f0f0" stroke="#808080" stroke-width="1"/>
  <rect x="359" y="70" width="331" height="26" fill="#4a90e2" rx="2"/>
  <text x="371" y="88" fill="white" font-size="12" font-weight="bold">New Testament</text>

  <rect x="359" y="100" width="331" height="24" fill="#e8e8e8" stroke="#bbb" stroke-width="1" rx="1"/>
  <text x="367" y="116" fill="#333" font-size="11" font-weight="600">Matthew</text>
  <text x="589" y="116" fill="#666" font-size="9">28 chapters</text>
  <text x="671" y="116" fill="#333" font-size="9">&#9654;</text>

  <rect x="359" y="126" width="331" height="24" fill="#e8e8e8" stroke="#bbb" stroke-width="1" rx="1"/>
  <text x="367" y="142" fill="#333" font-size="11" font-weight="600">Mark</text>
  <text x="589" y="142" fill="#666" font-size="9">16 chapters</text>
  <text x="671" y="142" fill="#333" font-size="9">&#9654;</text>

  <!-- Annotation: selected chapter -->
  <line x1="202" y1="140" x2="350" y2="160" stroke="#e44" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="354" y="164" fill="#e44" font-size="9" font-weight="bold">Click a chapter to view verses</text>

  <!-- Annotation: expanded indicator -->
  <line x1="322" y1="100" x2="350" y2="80" stroke="#e44" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="354" y="84" fill="#e44" font-size="9" font-weight="bold">Expanded (click to collapse)</text>
</svg>
