<svg xmlns="http://www.w3.org/2000/svg" width="700" height="120" font-family="'Segoe UI', Tahoma, sans-serif">
  <!-- Action bar background -->
  <rect width="700" height="60" y="10" fill="#333" rx="4"/>

  <!-- Verse reference -->
  <text x="20" y="46" fill="#fff" font-size="14" font-weight="bold">Genesis 3:1-3, 5</text>

  <!-- Clear button -->
  <rect x="340" y="20" width="70" height="34" rx="2" fill="#e8e8e8"/>
  <line x1="340" y1="20" x2="410" y2="20" stroke="white" stroke-width="1.5"/>
  <line x1="340" y1="20" x2="340" y2="54" stroke="white" stroke-width="1.5"/>
  <line x1="410" y1="20" x2="410" y2="54" stroke="#606060" stroke-width="1.5"/>
  <line x1="340" y1="54" x2="410" y2="54" stroke="#606060" stroke-width="1.5"/>
  <text x="361" y="42" fill="#333" font-size="11">Clear</text>

  <!-- Save button -->
  <rect x="420" y="20" width="70" height="34" rx="2" fill="#e8e8e8"/>
  <line x1="420" y1="20" x2="490" y2="20" stroke="white" stroke-width="1.5"/>
  <line x1="420" y1="20" x2="420" y2="54" stroke="white" stroke-width="1.5"/>
  <line x1="490" y1="20" x2="490" y2="54" stroke="#606060" stroke-width="1.5"/>
  <line x1="420" y1="54" x2="490" y2="54" stroke="#606060" stroke-width="1.5"/>
  <text x="441" y="42" fill="#333" font-size="11">Save</text>

  <!-- Save & Send button -->
  <rect x="500" y="20" width="90" height="34" rx="2" fill="#4a90e2"/>
  <text x="511" y="42" fill="white" font-size="11" font-weight="bold">Save+Send</text>

  <!-- Save, Send & Show button -->
  <rect x="600" y="20" width="90" height="34" rx="2" fill="#6bc76b"/>
  <line x1="600" y1="20" x2="690" y2="20" stroke="#8fd98f" stroke-width="1"/>
  <line x1="600" y1="20" x2="600" y2="54" stroke="#8fd98f" stroke-width="1"/>
  <line x1="690" y1="20" x2="690" y2="54" stroke="#3a9a3a" stroke-width="1"/>
  <line x1="600" y1="54" x2="690" y2="54" stroke="#3a9a3a" stroke-width="1"/>
  <text x="607" y="42" fill="white" font-size="11" font-weight="bold">Send+Show</text>

  <!-- Annotations -->
  <line x1="375" y1="60" x2="375" y2="80" stroke="#e44" stroke-width="1" stroke-dasharray="3"/>
  <text x="375" y="92" fill="#e44" font-size="9" font-weight="bold" text-anchor="middle">Clears</text>
  <text x="375" y="102" fill="#e44" font-size="9" font-weight="bold" text-anchor="middle">selection</text>

  <line x1="455" y1="60" x2="455" y2="80" stroke="#e44" stroke-width="1" stroke-dasharray="3"/>
  <text x="455" y="92" fill="#e44" font-size="9" font-weight="bold" text-anchor="middle">Saves to</text>
  <text x="455" y="102" fill="#e44" font-size="9" font-weight="bold" text-anchor="middle">list</text>

  <line x1="545" y1="60" x2="545" y2="80" stroke="#e44" stroke-width="1" stroke-dasharray="3"/>
  <text x="545" y="92" fill="#e44" font-size="9" font-weight="bold" text-anchor="middle">Saves + sends</text>
  <text x="545" y="102" fill="#e44" font-size="9" font-weight="bold" text-anchor="middle">to vMix</text>

  <line x1="645" y1="60" x2="645" y2="80" stroke="#e44" stroke-width="1" stroke-dasharray="3"/>
  <text x="645" y="92" fill="#e44" font-size="9" font-weight="bold" text-anchor="middle">Sends + shows</text>
  <text x="645" y="102" fill="#e44" font-size="9" font-weight="bold" text-anchor="middle">overlay</text>
</svg>
